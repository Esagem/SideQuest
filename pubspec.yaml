name: sidequest
description: "A gamified social bucket list app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  cached_network_image: ^3.4.0
  cloud_firestore: ^5.0.0
  cupertino_icons: ^1.0.8
  firebase_analytics: ^11.0.0
  firebase_auth: ^5.0.0
  firebase_core: ^3.0.0
  firebase_crashlytics: ^4.0.0
  firebase_dynamic_links: ^6.0.0
  firebase_messaging: ^15.0.0
  firebase_performance: ^0.10.0
  firebase_storage: ^12.0.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  freezed_annotation: ^2.4.0
  go_router: ^14.0.0
  google_fonts: ^6.2.0
  google_mobile_ads: ^5.0.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  image_cropper: ^7.0.0
  image_picker: ^1.1.0
  intl: ^0.19.0
  json_annotation: ^4.9.0
  lottie: ^3.0.0
  path_provider: any
  permission_handler: ^11.3.0
  purchases_flutter: ^8.0.0
  qr_flutter: ^4.1.0
  riverpod_annotation: ^2.3.0
  share_plus: ^9.0.0
  shared_preferences: ^2.3.0
  shimmer: ^3.0.0
  url_launcher: ^6.3.0
  uuid: ^4.4.0

dev_dependencies:
  build_runner: ^2.4.0
  fake_cloud_firestore: ^3.0.0
  flutter_launcher_icons: ^0.14.0
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  mockito: ^5.4.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash/
