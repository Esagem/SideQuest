# flutter_launcher_icons configuration
# Run: dart run flutter_launcher_icons
#
# Generates app icons for iOS and Android from a single source image.
# The icon should be a 1024x1024 PNG with sunset-to-navy gradient
# and a quest/compass motif.

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1B2A4A"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
